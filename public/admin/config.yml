backend:
  name: github
  repo: Thudeptrai02/learn-lab-web02 # Lát nữa đẩy lên Github chúng ta sẽ điền cái này
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # ----------------------------------------
  # 1. QUẢN LÝ BLOG (Viết bài chia sẻ)
  # ----------------------------------------
  - name: "blog"
    label: "Bài viết Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Tiêu đề bài viết", name: "title", widget: "string"}
      - {label: "Tóm tắt", name: "description", widget: "text"}
      - {label: "Ngày đăng", name: "pubDate", widget: "datetime"}
      - {label: "Ảnh bìa", name: "image", widget: "image", required: false}
      - {label: "Nội dung bài viết", name: "body", widget: "markdown"}

  # ----------------------------------------
  # 2. QUẢN LÝ FLASHCARDS (Từ vựng)
  # ----------------------------------------
  - name: "flashcards"
    label: "Bộ Từ Vựng (Flashcards)"
    folder: "src/content/flashcards"
    create: true
    extension: "json" 
    format: "json"
    fields:
      - {label: "Tên chủ đề (VD: Từ vựng TOEIC Part 1)", name: "title", widget: "string"}
      - {label: "Mô tả", name: "description", widget: "string", required: false}
      - label: "Danh sách từ vựng"
        name: "words"
        widget: "list" 
        fields:
          - {label: "Từ vựng (Tiếng Anh)", name: "word", widget: "string"}
          - {label: "Nghĩa (Tiếng Việt)", name: "meaning", widget: "string"}
          - {label: "Phiên âm", name: "phonetic", widget: "string", required: false}
          - {label: "Ví dụ minh họa", name: "example", widget: "text", required: false}
          - {label: "File phát âm (Audio)", name: "audio", widget: "file", required: false}

  # ----------------------------------------
  # 3. QUẢN LÝ DICTATION (Nghe chép chính tả)
  # ----------------------------------------
  - name: "dictation"
    label: "Bài tập Dictation"
    folder: "src/content/dictation"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Tên bài nghe", name: "title", widget: "string"}
      - {label: "Độ khó", name: "level", widget: "select", options: ["Dễ", "Trung bình", "Khó"]}
      - {label: "File Audio toàn bài", name: "audio", widget: "file"}
      - {label: "Đoạn văn gốc (Transcript)", name: "transcript", widget: "text", hint: "Văn bản chuẩn để đối chiếu kết quả"}
      - {label: "Bản dịch tiếng Việt", name: "translation", widget: "text", required: false}