backend:
  name: github
  repo: Thudeptrai02/learn-lab-web
  branch: main

media_folder: public/images
public_folder: /images

collections:
  # 1. QUẢN LÝ BLOG (Giữ nguyên của bạn)
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    extension: md
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime" }
      - { label: "Mô tả ngắn", name: "description", widget: "string" }
      - { label: "Nội dung", name: "body", widget: "markdown" }

  # 2. QUẢN LÝ TÀI LIỆU FREE (Giữ nguyên của bạn)
  - name: "resources"
    label: "Tài liệu Free"
    folder: "src/content/resources"
    create: true
    extension: md
    fields:
      - { label: "Tên tài liệu", name: "title", widget: "string" }
      - { label: "Mô tả", name: "description", widget: "string" }
      - { label: "Link tải", name: "url", widget: "string" }
      - { label: "Loại", name: "type", widget: "select", options: ["PDF", "Worksheet", "Checklist"] }

  # 3. QUẢN LÝ DICTATION (NGHE CHÉP CHÍNH TẢ)
  - name: "dictation"
    label: "Dictation (Nghe chép)"
    folder: "src/content/dictation"
    create: true
    extension: md
    fields:
      - { label: "Tiêu đề bài nghe", name: "title", widget: "string" }
      - { label: "Kỳ thi", name: "exam", widget: "select", options: ["TOEIC", "IELTS", "Cambridge"] }
      - { label: "File Audio", name: "audio", widget: "file", hint: "Tải lên file MP3 bài nghe" }
      - { label: "Bản dịch Tiếng Việt", name: "translation", widget: "text", required: false }
      - { label: "Transcript (Đáp án)", name: "body", widget: "markdown", hint: "Điền đoạn hội thoại tiếng Anh vào đây" }

  # 4. QUẢN LÝ FLASHCARD (TỪ VỰNG)
  - name: "flashcards"
    label: "Flashcards"
    folder: "src/content/flashcards"
    create: true
    extension: md
    fields:
      - { label: "Tên bộ từ vựng", name: "title", widget: "string" }
      - { label: "Kỳ thi", name: "exam", widget: "select", options: ["TOEIC", "IELTS", "Cambridge"] }
      - label: "Danh sách từ vựng"
        name: "words"
        widget: "list" # Widget này giúp bạn bấm nút thêm từ vựng liên tục rất tiện
        fields:
          - { label: "Từ vựng (Tiếng Anh)", name: "word", widget: "string" }
          - { label: "Loại từ (n, v, adj...)", name: "type", widget: "string" }
          - { label: "Nghĩa Tiếng Việt", name: "meaning", widget: "string" }
          - { label: "Câu ví dụ", name: "example", widget: "string", required: false }

  # 5. QUẢN LÝ ĐỀ KIỂM TRA (EXAMS) - CHUẨN BỊ SẴN CHO BẠN
  - name: "exams"
    label: "Đề kiểm tra"
    folder: "src/content/exams"
    create: true
    extension: md
    fields:
      - { label: "Tên đề thi", name: "title", widget: "string" }
      - { label: "Kỳ thi", name: "exam", widget: "select", options: ["TOEIC", "IELTS", "Cambridge"] }
      - label: "Danh sách câu hỏi"
        name: "questions"
        widget: "list"
        fields:
          - { label: "Nội dung câu hỏi", name: "question", widget: "string" }
          - { label: "Đáp án A", name: "optionA", widget: "string" }
          - { label: "Đáp án B", name: "optionB", widget: "string" }
          - { label: "Đáp án C", name: "optionC", widget: "string", required: false }
          - { label: "Đáp án D", name: "optionD", widget: "string", required: false }
          - { label: "Đáp án đúng", name: "correct", widget: "select", options: ["A", "B", "C", "D"] }